# .github/workflows/main.yml

name: CI/CD Pipeline

# Триггеры для запуска:
# - push в ветку main
# - pull request в ветку main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest  # Запускаем на виртуальной машине с Ubuntu

    steps:
    - name: 1. Checkout repository
      uses: actions/checkout@v3 # Шаг 1: Скачиваем код репозитория

    - name: 2. Set up Python
      uses: actions/setup-python@v4 # Шаг 2: Устанавливаем Python
      with:
        python-version: '3.11'

    - name: 3. Create .env for docker-compose
      shell: bash
      run: |
        echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}" > .env
        echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}" >> .env
        echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env
        echo "POSTGRES_SERVER=db" >> .env
        echo "POSTGRES_PORT=5432" >> .env

    - name: 4. Install test dependencies
      run: pip install pytest requests # Шаг 3: Устанавливаем зависимости для тестов

    - name: 5. Build and run containers
      run: docker-compose up -d --build # Шаг 4: Собираем образы и запускаем контейнеры в фоновом режиме

    - name: 6. Run tests
      run: pytest # Шаг 5: Запускаем тесты
      # Тесты будут обращаться к http://localhost:8000, 
      # где localhost - это виртуальная машина GitHub Actions, 
      # на которой запущен наш docker-compose.

    - name: 7. Stop containers
      if: always() # Этот шаг выполняется всегда, даже если тесты упали
      run: docker-compose down # Шаг 6: Останавливаем и удаляем контейнеры для очистки

