version: '3.8'

services:
  # Сервис базы данных PostgreSQL
  db:
    image: postgres:15-alpine  # Используем легковесный образ Postgres
    container_name: postgres_db_container
    env_file:
      - ./.env  # Загружаем переменные из .env файла (POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB)
    volumes:
      - postgres_data:/var/lib/postgresql/data/ # Сохраняем данные БД между перезапусками
    expose:
      - "5432" # Открываем порт только для внутренней сети Docker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Сервис нашего FastAPI приложения
  app:
    container_name: fastapi_app_container
    image: onit-app
    build:
      context: .
      network: host # Используем сеть хоста для сборки, чтобы решить проблемы с DNS
    env_file:
      - ./.env  # Загружаем переменные (включая POSTGRES_SERVER=db)
    ports:
      - "8000:8000"  # Пробрасываем порт 8000 на локальную машину
    depends_on:
      db:
        condition: service_healthy # Указываем, что приложение должно стартовать только после того, как БД будет готова

  # --- LR#4: 3 ноды (узлы) + Nginx с round-robin ---
  node1:
    container_name: node1_container
    image: onit-app
    environment:
      NODE_ID: "1"
    command: ["uvicorn", "node_app:app", "--host", "0.0.0.0", "--port", "8000"]

  node2:
    container_name: node2_container
    image: onit-app
    environment:
      NODE_ID: "2"
    command: ["uvicorn", "node_app:app", "--host", "0.0.0.0", "--port", "8000"]

  node3:
    container_name: node3_container
    image: onit-app
    environment:
      NODE_ID: "3"
    command: ["uvicorn", "node_app:app", "--host", "0.0.0.0", "--port", "8000"]

  nginx:
    container_name: nginx_lb_container
    image: nginx:alpine
    depends_on:
      - node1
      - node2
      - node3
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data: # Определяем volume для сохранения данных
